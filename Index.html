<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tree Planting Project </title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/leaflet.fullscreen.css"/>
<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif}

/* ═══════════════════════════════════════════════
   DESKTOP layout (sidebar left, map right)
   ═══════════════════════════════════════════════ */
.lx-app{display:flex;height:100vh;overflow:hidden}

.lx-sb{
  width:278px;flex-shrink:0;display:flex;flex-direction:column;
  overflow-y:auto;z-index:500;
  box-shadow:2px 0 16px rgba(0,0,0,.13);
  transition:background .25s,color .25s
}
.lx-sb.light{background:#f7f7f5;color:#1a1a1a}
.lx-sb.dark {background:#1b1b1d;color:#ebebea}
#lx-map{flex:1;min-width:0}

/* mobile FAB — hidden on desktop */
#lx-fab{display:none}

/* ═══════════════════════════════════════════════
   SHARED components
   ═══════════════════════════════════════════════ */

/* header */
.lx-hdr{padding:16px 16px 12px;border-bottom:1px solid rgba(128,128,128,.13)}
.lx-title{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:3px}
.lx-sub{font-size:11px;opacity:.58;line-height:1.5}
.lx-badge{
  display:inline-block;background:rgba(128,128,128,.12);border-radius:10px;
  padding:2px 9px;font-size:10px;font-weight:600;margin-top:6px
}

/* sections */
.lx-sec{padding:12px 15px;border-bottom:1px solid rgba(128,128,128,.09)}
.lx-sec-ttl{
  font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;opacity:.42;margin-bottom:8px
}

/* legend header */
.leg-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.leg-hdr-lbl{font-size:11.5px;font-weight:600;opacity:.55}
.leg-toggle-all{
  font-size:10px;opacity:.5;cursor:pointer;border:none;background:none;
  color:inherit;padding:0;text-decoration:underline
}
.leg-toggle-all:hover{opacity:.9}

/* legend rows */
.leg-item{
  display:flex;align-items:center;gap:8px;padding:4px 5px;
  cursor:pointer;border-radius:5px;user-select:none;transition:background .1s
}
.leg-item:hover{background:rgba(128,128,128,.09)}

/* custom checkbox */
.leg-cb{
  appearance:none;-webkit-appearance:none;
  width:16px;height:16px;min-width:16px;border-radius:3px;
  cursor:pointer;border:1.5px solid rgba(128,128,128,.38);
  background:transparent;position:relative;
  transition:background .12s,border-color .12s
}
.leg-cb:checked{background:#3b82f6;border-color:#3b82f6}
.leg-cb:checked::after{
  content:'';position:absolute;left:3px;top:0px;
  width:5px;height:9px;
  border:2px solid #fff;border-top:none;border-left:none;
  transform:rotate(45deg)
}
.leg-item.unchecked{opacity:.32}
.leg-label{font-size:11.5px;flex:1;line-height:1.3}

/* buttons / controls */
.ctrl-row{display:flex;gap:6px;flex-wrap:wrap}
.ctrl-btn{
  padding:5px 11px;border-radius:5px;
  border:1px solid rgba(128,128,128,.22);
  background:transparent;font-size:11px;cursor:pointer;
  font-weight:500;color:inherit;transition:background .12s
}
.ctrl-btn:hover{background:rgba(128,128,128,.13)}
.ctrl-btn.full{width:100%;margin-top:0}
.lx-sel{
  padding:5px 8px;border-radius:5px;
  border:1px solid rgba(128,128,128,.22);
  background:transparent;font-size:11px;cursor:pointer;
  color:inherit;width:100%;margin-top:8px
}

/* embed panel */
.embed-panel{display:none;margin-top:9px}
.embed-panel.open{display:block}
.embed-box{
  width:100%;height:86px;font-size:9.5px;font-family:monospace;
  resize:none;border-radius:5px;padding:6px 8px;
  border:1px solid rgba(128,128,128,.22);
  background:rgba(128,128,128,.06);color:inherit;line-height:1.45
}
.embed-copy-btn{
  margin-top:5px;width:100%;padding:6px;border-radius:5px;
  border:1px solid rgba(128,128,128,.22);background:transparent;
  font-size:11px;cursor:pointer;font-weight:600;color:inherit;
  transition:background .12s,color .12s
}
.embed-copy-btn:hover{background:rgba(128,128,128,.12)}
.embed-copy-btn.copied{
  background:#22c55e !important;color:#fff !important;border-color:#22c55e !important
}
.embed-hint{font-size:9.5px;opacity:.42;margin-top:5px;line-height:1.5}

/* popup */
.lx-popup{min-width:180px;max-width:260px;font-size:12px}
.lx-popup .pop-name{
  font-size:13px;font-weight:700;margin-bottom:5px;
  border-bottom:1px solid rgba(128,128,128,.18);padding-bottom:4px
}
.lx-popup table{width:100%;border-collapse:collapse}
.lx-popup td{
  padding:2.5px 0;font-size:11px;
  border-bottom:1px solid rgba(128,128,128,.07)
}
.lx-popup td:first-child{color:#888;width:42%;font-weight:500}
.lx-popup td:last-child{font-weight:500;text-align:right;word-break:break-word}

/* tooltip */
.lx-tip{
  background:rgba(255,255,255,.96);color:#1a1a1a;
  padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,.18);pointer-events:none
}
.leaflet-container{font-family:inherit}
.leaflet-control-attribution{font-size:10px}

/* ═══════════════════════════════════════════════
   MOBILE layout  (≤ 768 px)
   Sidebar becomes a bottom sheet / drawer.
   Map fills the full viewport.
   A floating action button (FAB) opens the panel.
   ═══════════════════════════════════════════════ */
@media (max-width:768px){

  /* stack vertically: map fills viewport, panel overlays */
  .lx-app{flex-direction:column;position:relative}

  /* MAP — full screen */
  #lx-map{
    position:absolute;inset:0;width:100%;height:100%;
    z-index:0
  }

  /* SIDEBAR — bottom sheet */
  .lx-sb{
    position:fixed;
    bottom:0;left:0;right:0;
    width:100%;
    /* collapsed: only the drag-handle peek above the bottom */
    height:52px;
    max-height:82vh;
    border-radius:18px 18px 0 0;
    box-shadow:0 -4px 28px rgba(0,0,0,.22);
    overflow:hidden;
    z-index:1000;
    transition:height .32s cubic-bezier(.4,0,.2,1),
               background .25s, color .25s;
    flex-direction:column
  }
  /* expanded state toggled by JS */
  .lx-sb.expanded{
    height:82vh;
    overflow-y:auto
  }

  /* drag handle bar at very top of sheet */
  .lx-sb::before{
    content:'';
    display:block;flex-shrink:0;
    width:38px;height:4px;
    background:rgba(128,128,128,.35);
    border-radius:2px;
    margin:10px auto 6px;
  }

  /* hide the drag handle divider in normal header */
  .lx-hdr{padding:8px 16px 10px}

  /* make sections comfortable on touch */
  .lx-sec{padding:14px 16px}
  .leg-item{padding:7px 5px;gap:11px}
  .leg-cb{width:20px;height:20px;min-width:20px}
  .leg-cb:checked::after{left:4px;top:1px;width:7px;height:11px}
  .leg-label{font-size:13px}
  .ctrl-btn{padding:8px 14px;font-size:12px}
  .lx-sel{padding:8px 10px;font-size:12px;margin-top:10px}
  .embed-box{height:100px;font-size:10px}
  .embed-copy-btn{padding:9px;font-size:12px}

  /* FAB — floating button bottom-right to open panel */
  #lx-fab{
    display:flex;
    position:fixed;
    bottom:68px;right:14px;
    z-index:1100;
    width:46px;height:46px;
    border-radius:50%;
    background:#3b82f6;color:#fff;
    border:none;cursor:pointer;
    align-items:center;justify-content:center;
    font-size:20px;
    box-shadow:0 4px 14px rgba(59,130,246,.55);
    transition:transform .15s,background .15s
  }
  #lx-fab:active{transform:scale(.92)}
  #lx-fab.open{background:#ef4444;box-shadow:0 4px 14px rgba(239,68,68,.5)}

  /* overlay backdrop when sheet is open */
  #lx-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.35);
    z-index:999;
    backdrop-filter:blur(1px)
  }
  #lx-backdrop.show{display:block}

  /* Leaflet zoom controls — move up so they clear the sheet */
  .leaflet-top.leaflet-left{top:12px}
  .leaflet-top.leaflet-right{top:12px}
  /* Push scale bar above the sheet handle */
  .leaflet-bottom.leaflet-right{bottom:60px}
  .leaflet-bottom.leaflet-left{bottom:60px}
}

/* ── Very small phones (≤ 400 px) ── */
@media (max-width:400px){
  .lx-sb{max-height:88vh}
  .lx-sb.expanded{height:88vh}
}

</style>
</head>
<body>
<div class="lx-app">
<!-- backdrop (mobile only — tap to close sheet) -->
<div id="lx-backdrop" onclick="lxCloseMobile()"></div>

<!-- FAB (mobile only — opens the bottom sheet) -->
<button id="lx-fab" onclick="lxToggleMobile()" aria-label="Open legend">☰</button>

<div class="lx-sb light" id="lx-sb">

  <div class="lx-hdr">
    <div class="lx-title">Tree Planting Project </div>
    <div class="lx-sub">Coict - Dar es salaam</div>
    <div class="lx-badge" id="lx-count">…</div>
  </div>

  <!-- LEGEND (checkboxes) -->
  <div class="lx-sec">
    <div class="lx-sec-ttl">Legend</div>
    <div class="leg-hdr">
      <span class="leg-hdr-lbl">Layers</span>
      <button class="leg-toggle-all" id="leg-all-btn"
              onclick="lxToggleAll()">Hide all</button>
    </div>
    <div id="leg-list">
<label class="leg-item" data-label="Planted_Trees"><input type="checkbox" class="leg-cb" data-label="Planted_Trees" checked><svg width="16" height="16" viewBox="0 0 16 16" style="flex-shrink:0"><circle cx="8" cy="8" r="5.5" fill="#3bc739" fill-opacity="1.0" stroke="#232323" stroke-width="1.5"/></svg><span class="leg-label">Planted_Trees</span></label>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="lx-sec">
    <div class="lx-sec-ttl">Controls</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="lx-theme-btn"
              onclick="lxToggleTheme()">☾ Dark mode</button>
    </div>
    <select id="lx-bm-sel" class="lx-sel"
            onchange="lxSwitchBasemap(this.value)"></select>
  </div>

  <!-- EMBED CODE -->
  <div class="lx-sec">
    <div class="lx-sec-ttl">Embed in website</div>
    <button class="ctrl-btn full" id="embed-toggle-btn"
            onclick="lxToggleEmbed()">&lt;/&gt;&nbsp; Show embed code</button>
    <div class="embed-panel" id="embed-panel">
      <textarea class="embed-box" id="embed-box" readonly
                placeholder="Generating…"></textarea>
      <button class="embed-copy-btn" id="embed-copy-btn"
              onclick="lxCopyEmbed()">Copy snippet</button>
      <div class="embed-hint">
        Paste the &lt;div&gt;+&lt;script&gt; block into your page &lt;body&gt;.<br>
        Add the two CDN &lt;link&gt; tags to your &lt;head&gt;.
      </div>
    </div>
  </div>

</div>
  <div id="lx-map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/Leaflet.fullscreen.min.js"></script>

const LX_BASEMAPS   = [{"name": "CartoDB Positron (Light)", "url": "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", "attr": "&copy; <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a> &copy; <a href=\"https://carto.com/\">CARTO</a>"}, {"name": "CartoDB Dark Matter", "url": "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", "attr": "&copy; OpenStreetMap &copy; CARTO"}, {"name": "OpenStreetMap", "url": "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", "attr": "&copy; <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a> contributors"}, {"name": "Esri World Imagery", "url": "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", "attr": "Tiles &copy; Esri"}];
const LX_GEOMTYPE   = "point";
const LX_STYLEINFO  = {"type": "single", "field": null, "legend": [{"label": "Planted_Trees", "style": {"fill": "#3bc739", "fillOpacity": 1.0, "stroke": "#232323", "strokeOpacity": 1.0, "weight": 0.5, "dashArray": null, "radius": 5, "shape": "circle"}}]};
const LX_POPUP_FLDS = ["ele", "time", "magvar", "geoidheigh", "name", "cmt", "desc", "src", "link1_href", "link1_text", "link1_type", "link2_href", "link2_text", "link2_type", "sym", "type", "fix", "sat", "hdop", "vdop", "pdop", "ageofdgpsd", "dgpsid", "layer", "path"];
let   LX_DARK       = false;

// ── Visibility state (Set of visible legend labels) ────────────────────────────
const lxVisible = new Set(
  LX_STYLEINFO.legend.map(e => e.label)
);

// ── Map ───────────────────────────────────────────────────────────────────────
const lxMap = L.map('lx-map', {zoomControl:true});
L.control.scale({position:'bottomright',metric:true,imperial:false}).addTo(lxMap);
if(typeof L.control.fullscreen !== 'undefined')
  L.control.fullscreen({position:'topright'}).addTo(lxMap);

let lxTile = null;
function lxSwitchBasemap(idx) {
  const bm = LX_BASEMAPS[parseInt(idx)];
  if(lxTile) lxMap.removeLayer(lxTile);
  lxTile = L.tileLayer(bm.url, {attribution:bm.attr, maxZoom:20}).addTo(lxMap);
  document.getElementById('lx-bm-sel').value = idx;
}
const bmSel = document.getElementById('lx-bm-sel');
LX_BASEMAPS.forEach((bm,i) => {
  const o = document.createElement('option');
  o.value = i; o.textContent = bm.name; bmSel.appendChild(o);
});
lxSwitchBasemap(2);

// ── Style helpers ─────────────────────────────────────────────────────────────
function lxLeafletStyle(feat) {
  const s = feat.properties._style || {};
  return {
    fillColor:   s.fill        || '#3388ff',
    fillOpacity: s.fillOpacity ?? 0.65,
    color:       s.stroke      || '#333',
    weight:      s.weight      || 1.5,
    dashArray:   s.dashArray   || null,
    opacity:     s.strokeOpacity ?? 1,
  };
}
function lxHoverStyle(feat) {
  const s = feat.properties._style || {};
  return {
    fillColor:   s.fill || '#3388ff',
    fillOpacity: Math.min(1, (s.fillOpacity ?? 0.65) + 0.18),
    color:       '#111',
    weight:      Math.max(2, (s.weight || 1.5) + 1),
    dashArray:   s.dashArray || null,
    opacity:     1,
  };
}
function lxPointToLayer(feat, latlng) {
  const s      = feat.properties._style || {};
  const radius = s.radius || 6;
  const shape  = s.shape  || 'circle';
  if(shape === 'circle') {
    return L.circleMarker(latlng, {
      radius,
      fillColor:   s.fill        || '#3388ff',
      fillOpacity: s.fillOpacity ?? 0.8,
      color:       s.stroke      || '#333',
      weight:      s.weight      || 1.5,
    });
  }
  const sz=radius*2+4, cx=sz/2, cy=sz/2, r=radius;
  const fa=s.fillOpacity??0.8, fi=s.fill||'#3388ff',
        st=s.stroke||'#333',   sw=s.weight||1.5;
  let svg='';
  if(shape==='square')
    svg=`<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r*2}" rx="2"
      fill="${fi}" fill-opacity="${fa}" stroke="${st}" stroke-width="${sw}"/>`;
  else if(shape==='diamond'){
    const pts=`${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}`;
    svg=`<polygon points="${pts}" fill="${fi}" fill-opacity="${fa}"
      stroke="${st}" stroke-width="${sw}"/>`;
  }else if(shape==='triangle'){
    const pts=`${cx},${cy-r} ${cx+r},${cy+r} ${cx-r},${cy+r}`;
    svg=`<polygon points="${pts}" fill="${fi}" fill-opacity="${fa}"
      stroke="${st}" stroke-width="${sw}"/>`;
  }else{
    svg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fi}"
      fill-opacity="${fa}" stroke="${st}" stroke-width="${sw}"/>`;
  }
  return L.marker(latlng, {icon: L.divIcon({
    html:`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"
      xmlns="http://www.w3.org/2000/svg">${svg}</svg>`,
    className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2],
  })});
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const lxTip = L.tooltip({sticky:true, opacity:1, className:'lx-tip'});

// ── GeoJSON layer (filter uses lxVisible set) ─────────────────────────────────
const lxLayer = L.geoJSON(LX_GEOJSON, {
  style:        lxLeafletStyle,
  pointToLayer: lxPointToLayer,
  filter: feat => lxVisible.has(feat.properties._legend_label),
  onEachFeature: (feat, layer) => {
    const p     = feat.properties;
    const label = p._label || '';

    // Popup
    const rows = LX_POPUP_FLDS
      .filter(k => p[k] !== undefined)
      .map(k => `<tr><td>${k}</td><td>${p[k]||''}</td></tr>`)
      .join('');
    layer.bindPopup(
      `<div class="lx-popup">
        ${label ? `<div class="pop-name">${label}</div>` : ''}
        ${rows
          ? `<table>${rows}</table>`
          : '<em style="opacity:.45;font-size:11px">No attributes</em>'}
       </div>`,
      {maxWidth:280}
    );

    // Hover (polygon/line only)
    layer.on('mouseover', e => {
      if(LX_GEOMTYPE !== 'point') {
        layer.setStyle(lxHoverStyle(feat));
        layer.bringToFront();
      }
      lxTip.setContent(
        `<strong>${label || p._legend_label || 'Feature'}</strong>`);
      layer.bindTooltip(lxTip).openTooltip(e.latlng);
    });
    layer.on('mousemove', e => lxTip.setLatLng(e.latlng));
    layer.on('mouseout',  () => {
      if(LX_GEOMTYPE !== 'point') lxLayer.resetStyle(layer);
      layer.closeTooltip();
    });
  }
}).addTo(lxMap);

try { lxMap.fitBounds(lxLayer.getBounds(), {padding:[20,20]}); }
catch(e) { lxMap.setView([0,20], 3); }

document.getElementById('lx-count').textContent =
  LX_GEOJSON.features.length.toLocaleString() + ' features';

// ── Checkbox legend — tick / untick ───────────────────────────────────────────
// Re-applies the GeoJSON filter by clearing and re-adding all features.
function lxRefreshLayer() {
  lxLayer.clearLayers();
  lxLayer.addData(LX_GEOJSON);
}

function lxUpdateAllBtn() {
  const cbs       = [...document.querySelectorAll('.leg-cb')];
  const allOn     = cbs.every(c => c.checked);
  const noneOn    = cbs.every(c => !c.checked);
  const btn       = document.getElementById('leg-all-btn');
  btn.textContent = allOn ? 'Hide all' : 'Show all';
}

document.querySelectorAll('.leg-cb').forEach(cb => {
  cb.addEventListener('change', () => {
    const lbl  = cb.dataset.label;
    const item = cb.closest('.leg-item');
    if(cb.checked) {
      lxVisible.add(lbl);
      item.classList.remove('unchecked');
    } else {
      lxVisible.delete(lbl);
      item.classList.add('unchecked');
    }
    lxRefreshLayer();
    lxUpdateAllBtn();
  });
});

// "Hide all / Show all" master toggle
let lxAllOn = true;
function lxToggleAll() {
  lxAllOn = !lxAllOn;
  document.querySelectorAll('.leg-cb').forEach(cb => {
    cb.checked = lxAllOn;
    const item = cb.closest('.leg-item');
    item.classList.toggle('unchecked', !lxAllOn);
    if(lxAllOn) lxVisible.add(cb.dataset.label);
    else        lxVisible.delete(cb.dataset.label);
  });
  lxRefreshLayer();
  document.getElementById('leg-all-btn').textContent =
    lxAllOn ? 'Hide all' : 'Show all';
}

// ── Dark / light theme ────────────────────────────────────────────────────────
function lxToggleTheme() {
  LX_DARK = !LX_DARK;
  const sb  = document.getElementById('lx-sb');
  const btn = document.getElementById('lx-theme-btn');
  sb.classList.toggle('dark',  LX_DARK);
  sb.classList.toggle('light', !LX_DARK);
  btn.textContent = LX_DARK ? '☀ Light mode' : '☾ Dark mode';
}
if(LX_DARK) {
  document.getElementById('lx-sb').classList.replace('light','dark');
  document.getElementById('lx-theme-btn').textContent = '☀ Light mode';
}

// ── Embed code panel ──────────────────────────────────────────────────────────
// Shows a copy-ready snippet in the sidebar.
// The snippet includes:
//   • Two CDN <link> tags (add to <head>)
//   • The complete <div class="lx-app">…</div> with sidebar + map
//   • Two CDN <script> tags
//   • One <script> with all JS and inlined GeoJSON data
//   • One <style> block with all CSS
// Everything is already on this page — we just extract it.

let lxEmbedOpen = false;

function lxToggleEmbed() {
  lxEmbedOpen = !lxEmbedOpen;
  const panel  = document.getElementById('embed-panel');
  const togBtn = document.getElementById('embed-toggle-btn');
  panel.classList.toggle('open', lxEmbedOpen);
  togBtn.textContent = lxEmbedOpen
    ? '✕  Hide embed code'
    : '</> Show embed code';
  if(lxEmbedOpen) lxBuildEmbed();
}

function lxBuildEmbed() {
  const cdn_head = [
    '  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>',
    '  <link rel="stylesheet" href="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/leaflet.fullscreen.css"/>',
  ].join('\n');

  const cdn_scripts = [
    '<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>',
    '<script src="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/Leaflet.fullscreen.min.js"><\/script>',
  ].join('\n');

  // Grab live sidebar HTML (reflects current state)
  const sidebarHTML = document.getElementById('lx-sb').outerHTML;

  // Grab the page CSS
  const cssText = Array.from(document.styleSheets)
    .flatMap(ss => { try { return Array.from(ss.cssRules).map(r=>r.cssText); } catch{return[];} })
    .join('\n');

  // Grab the main script (last <script> on the page)
  const scripts   = document.querySelectorAll('script');
  const jsContent = scripts[scripts.length-1].textContent.trim();

  const snippet = [
    `<!-- ═══ EMBED MAP ═══`,
    `     1. Add to <head>:`,
    cdn_head,
    `     2. Paste this block into <body>:`,
    `═══ -->`,
    `<style>`,
    `.lx-app{display:flex;height:600px;overflow:hidden}`,
    `#lx-map{flex:1;min-width:0}`,
    cssText,
    `</style>`,
    `<div class="lx-app">`,
    sidebarHTML,
    `  <div id="lx-map"></div>`,
    `</div>`,
    cdn_scripts,
    `<script>`,
    jsContent,
    `<\/script>`,
    `<!-- ═══ END EMBED ═══ -->`,
  ].join('\n');

  document.getElementById('embed-box').value = snippet;
}

function lxCopyEmbed() {
  const box = document.getElementById('embed-box');
  const btn = document.getElementById('embed-copy-btn');
  const txt = box.value;
  const done = () => {
    btn.textContent = '✓ Copied to clipboard!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy snippet';
      btn.classList.remove('copied');
    }, 2200);
  };
  if(navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(done).catch(() => {
      box.select(); document.execCommand('copy'); done();
    });
  } else {
    box.select(); document.execCommand('copy'); done();
  }
}

// ── Mobile bottom-sheet open / close ─────────────────────────────────────────
// Only active when the media query fires (≤768px).
// The CSS already positions #lx-sb as a fixed bottom sheet;
// JS just toggles the .expanded class and the backdrop.

let lxSheetOpen = false;

function lxToggleMobile() {
  lxSheetOpen ? lxCloseMobile() : lxOpenMobile();
}

function lxOpenMobile() {
  lxSheetOpen = true;
  document.getElementById('lx-sb').classList.add('expanded');
  document.getElementById('lx-backdrop').classList.add('show');
  document.getElementById('lx-fab').classList.add('open');
  document.getElementById('lx-fab').innerHTML = '✕';
  // Invalidate Leaflet map size — map container may have resized
  setTimeout(() => lxMap.invalidateSize(), 350);
}

function lxCloseMobile() {
  lxSheetOpen = false;
  document.getElementById('lx-sb').classList.remove('expanded');
  document.getElementById('lx-backdrop').classList.remove('show');
  document.getElementById('lx-fab').classList.remove('open');
  document.getElementById('lx-fab').innerHTML = '☰';
}

// Touch swipe-down on the sheet handle closes it
(function() {
  const sb = document.getElementById('lx-sb');
  let startY = 0, isDragging = false;
  sb.addEventListener('touchstart', e => {
    // only trigger if touch begins near the top of the sheet (handle zone)
    const rect = sb.getBoundingClientRect();
    if(e.touches[0].clientY - rect.top < 36) {
      startY = e.touches[0].clientY;
      isDragging = true;
    }
  }, {passive:true});
  sb.addEventListener('touchmove', e => {
    if(!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 60) { lxCloseMobile(); isDragging = false; }
  }, {passive:true});
  sb.addEventListener('touchend', () => { isDragging = false; }, {passive:true});
})();

</script>
